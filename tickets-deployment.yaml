apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets
  template:
    metadata:
      labels:
        app: tickets
    spec:
      containers:
      - name: tickets
        image: hammamioumayma/tickets:latest
        ports:
        - containerPort: 3002
        env:
        - name: JWT_KEY
          valueFrom:
            secretKeyRef:
              name: micro-app-secrets
              key: JWT_KEY
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: micro-app-secrets
              key: MONGO_URI
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: micro-app-secrets
              key: RABBITMQ_URL
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-srv
spec:
  selector:
    app: tickets
  ports:
  - port: 3002
    targetPort: 3002
